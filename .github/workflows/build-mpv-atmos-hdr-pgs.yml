name: Build mpv Atmos HDR PGS fix

on:
  push:
    branches:
      - codex/hdr-pgs-core-fix
    paths:
      - ".github/workflows/build-mpv-atmos-hdr-pgs.yml"
      - "patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch"
  workflow_dispatch:

permissions:
  contents: read

env:
  MPV_MASTER_REF: 99b4c12cc
  MPV_OMNIPHONY_REF: v0.4.1-fel-beta.6
  OMNIPHONY_ENGINE_REF: v0.4.1
  OFFICIAL_PLAYER_SHA256: cafb15186b96f637f7448af4e99cc9411001a50706459389822a8aea2d678a4a

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 240

    steps:
      - name: Check out mpv-Yaozhi patch
        uses: actions/checkout@v6

      - name: Check out mpv-omniphony beta.6 integration
        uses: actions/checkout@v6
        with:
          repository: mgth/mpv-omniphony
          ref: ${{ env.MPV_OMNIPHONY_REF }}
          path: mpv-omniphony

      - name: Bootstrap Arch and MinGW repository
        shell: bash
        run: |
          set -euxo pipefail
          pacman-key --init
          cat >> /etc/pacman.conf <<'EOF'

          [ownstuff]
          SigLevel = Optional TrustAll
          Server = https://martchus.no-ip.biz/repo/arch/$repo/os/$arch
          EOF
          pacman -Syu --noconfirm

      - name: Install MinGW and FEL build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel git unzip zip curl rustup nasm cmake \
            mingw-w64-gcc \
            mingw-w64-pkg-config \
            mingw-w64-meson \
            mingw-w64-libass \
            mingw-w64-vulkan-headers mingw-w64-vulkan-icd-loader \
            mingw-w64-shaderc mingw-w64-spirv-cross mingw-w64-lcms2 \
            mingw-w64-zlib mingw-w64-libdvdnav mingw-w64-libdvdread
          rustup default stable
          rustup target add x86_64-pc-windows-gnu

      - name: Install prebuilt cargo-c
        shell: bash
        run: |
          set -euxo pipefail
          CARGOC_VER=0.10.23
          curl -fsSL \
            "https://github.com/lu-zero/cargo-c/releases/download/v${CARGOC_VER}/cargo-c-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin \
                cargo-capi cargo-cbuild cargo-cinstall cargo-ctest
          command -v cargo-cinstall

      - name: Write MinGW cross file
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p sysroot
          cat > sysroot/mingw-cross.ini <<'EOF'
          [binaries]
          c = 'x86_64-w64-mingw32-gcc'
          cpp = 'x86_64-w64-mingw32-g++'
          ar = 'x86_64-w64-mingw32-ar'
          strip = 'x86_64-w64-mingw32-strip'
          pkg-config = 'x86_64-w64-mingw32-pkg-config'
          windres = 'x86_64-w64-mingw32-windres'
          dlltool = 'x86_64-w64-mingw32-dlltool'

          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

      - name: Resolve pinned libplacebo source
        id: libplacebo
        shell: bash
        run: |
          set -euxo pipefail
          source mpv-omniphony/deps-fel/pins-fel.env
          echo "ref=${LIBPLACEBO_REF}" >> "$GITHUB_OUTPUT"

      - name: Restore FEL dependency cache
        id: felcache
        uses: actions/cache@v5
        with:
          path: |
            /usr/x86_64-w64-mingw32/bin
            /usr/x86_64-w64-mingw32/lib/pkgconfig
            /usr/x86_64-w64-mingw32/lib/libplacebo*
            /usr/x86_64-w64-mingw32/lib/libav*
            /usr/x86_64-w64-mingw32/lib/libsw*
            /usr/x86_64-w64-mingw32/lib/libdovi*
            /usr/x86_64-w64-mingw32/include/libplacebo
            /usr/x86_64-w64-mingw32/include/libav*
            /usr/x86_64-w64-mingw32/include/libsw*
            /usr/x86_64-w64-mingw32/include/ffnvcodec
          key: mpv-atmos-fel-mingw-v3-${{ steps.libplacebo.outputs.ref }}-${{ hashFiles('mpv-omniphony/deps-fel/**', 'mpv-omniphony/scripts/build-fel-deps.sh') }}

      - name: Build FEL dependencies
        if: steps.felcache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          PREFIX=/usr/x86_64-w64-mingw32 \
          WORK="$GITHUB_WORKSPACE/fel-work" \
          CROSS_FILE="$GITHUB_WORKSPACE/sysroot/mingw-cross.ini" \
            bash mpv-omniphony/scripts/build-fel-deps.sh --cross

      - name: Verify FEL dependencies
        shell: bash
        run: |
          set -euxo pipefail
          x86_64-w64-mingw32-pkg-config --atleast-version=7.370 libplacebo
          x86_64-w64-mingw32-pkg-config --exists dovi

      - name: Build ABI-matched libsrt
        shell: bash
        run: |
          set -euxo pipefail
          SYS=/usr/x86_64-w64-mingw32
          pacman -S --noconfirm --needed --overwrite '*' \
            mingw-w64-cmake mingw-w64-openssl
          SRT_VER=1.5.5
          curl -fsSLO \
            "https://github.com/Haivision/srt/archive/refs/tags/v${SRT_VER}.tar.gz"
          tar xzf "v${SRT_VER}.tar.gz"
          mkdir "srt-${SRT_VER}/build"
          cd "srt-${SRT_VER}/build"
          x86_64-w64-mingw32-cmake .. \
            -DENABLE_APPS=OFF \
            -DENABLE_BONDING=OFF \
            -DENABLE_STATIC=OFF \
            -DENABLE_SHARED=ON \
            -DCMAKE_INSTALL_PREFIX="$SYS"
          cmake --build . -j"$(nproc)"
          cmake --install .
          if [ -f "$SYS/bin/srt.dll" ] && [ ! -f "$SYS/bin/libsrt.dll" ]; then
            cp "$SYS/bin/srt.dll" "$SYS/bin/libsrt.dll"
          fi

      - name: Build Lua 5.2
        shell: bash
        run: |
          set -euxo pipefail
          SYS=/usr/x86_64-w64-mingw32
          LUA_VER=5.2.4
          curl -fsSLO "https://www.lua.org/ftp/lua-${LUA_VER}.tar.gz"
          tar xzf "lua-${LUA_VER}.tar.gz"
          make -C "lua-${LUA_VER}" \
            PLAT=mingw \
            CC=x86_64-w64-mingw32-gcc \
            AR="x86_64-w64-mingw32-ar rcu" \
            RANLIB=x86_64-w64-mingw32-ranlib \
            mingw
          install -Dm755 "lua-${LUA_VER}/src/lua52.dll" "$SYS/bin/lua52.dll"
          install -Dm644 "lua-${LUA_VER}/src/liblua.a" "$SYS/lib/liblua52.a"
          for header in lua lualib lauxlib luaconf; do
            install -Dm644 "lua-${LUA_VER}/src/${header}.h" "$SYS/include/${header}.h"
          done
          install -d "$SYS/lib/pkgconfig"
          cat > "$SYS/lib/pkgconfig/lua52.pc" <<EOF
          prefix=$SYS
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: Lua
          Description: Lua 5.2 (MinGW cross build)
          Version: ${LUA_VER}
          Libs: -L\${libdir} -llua52
          Cflags: -I\${includedir}
          EOF

      - name: Install pinned Omniphony engine
        shell: bash
        run: |
          set -euxo pipefail
          SYS=/usr/x86_64-w64-mingw32
          archive=/tmp/mpv-omniphony-beta6.zip
          curl -fsSL \
            "https://github.com/mgth/Omniphony/releases/download/mpv-v0.4.1-fel-beta.6/mpv-omniphony-fel-windows-x86_64.zip" \
            -o "$archive"
          echo "${OFFICIAL_PLAYER_SHA256}  $archive" | sha256sum -c -
          mkdir -p /tmp/mpv-omniphony-beta6
          unzip -q "$archive" -d /tmp/mpv-omniphony-beta6
          engine="$(find /tmp/mpv-omniphony-beta6 -type f -iname orender.dll -print -quit)"
          header="$(find /tmp/mpv-omniphony-beta6 -type f -iname orender.h -print -quit)"
          test -n "$engine"
          test -n "$header"
          install -Dm755 "$engine" "$SYS/bin/orender.dll"
          install -Dm755 "$engine" "$SYS/lib/orender.dll"
          install -Dm644 "$header" "$SYS/include/orender.h"
          install -d "$SYS/lib/pkgconfig"
          cat > "$SYS/lib/pkgconfig/orender.pc" <<EOF
          prefix=$SYS
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: orender
          Description: Omniphony renderer C library
          Version: 0.99.0
          Libs: -L\${libdir} -lorender
          Cflags: -I\${includedir}
          EOF

      - name: Build libbluray with BD-ISO support
        shell: bash
        run: |
          set -euxo pipefail
          CROSS_FILE="$GITHUB_WORKSPACE/sysroot/mingw-cross.ini" \
            bash mpv-omniphony/scripts/build-libbluray-mingw.sh

      - name: Apply Atmos and image subtitle patches
        shell: bash
        run: |
          set -euxo pipefail
          cd mpv-omniphony
          MPV_MASTER_REF="$MPV_MASTER_REF" bash scripts/apply-patches-master.sh
          src="$(find build -maxdepth 1 -type d -name 'mpv-master-*' \
            ! -name 'mpv-master-clone' -print -quit)"
          test -n "$src"
          src="$(realpath "$src")"
          git -C "$src" apply --3way \
            "$GITHUB_WORKSPACE/patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch"
          echo "MPV_DIR=$src" >> "$GITHUB_ENV"
          git -C "$src" diff --check

      - name: Cross-compile Atmos mpv
        shell: bash
        run: |
          set -euxo pipefail
          cd "$MPV_DIR"
          meson setup _b \
            --cross-file="$GITHUB_WORKSPACE/sysroot/mingw-cross.ini" \
            -Dorender=enabled \
            -Dlua=lua52 \
            -Dasio=enabled \
            -Dd3d11=enabled \
            -Dcuda-hwaccel=enabled \
            -Dlibbluray=enabled \
            -Ddvdnav=enabled
          meson compile -C _b

      - name: Package custom Atmos player
        shell: bash
        run: |
          set -euxo pipefail
          SYS=/usr/x86_64-w64-mingw32
          mkdir -p staging
          cp "$MPV_DIR/_b/mpv.exe" staging/
          cp "$MPV_DIR/_b/mpv.com" staging/
          cp "$SYS/bin/orender.dll" staging/
          cp "$SYS/include/orender.h" staging/
          cp mpv-omniphony/README.md staging/
          cp mpv-omniphony/COPYING staging/
          cp mpv-omniphony/THIRD-PARTY-NOTICES.md staging/
          cp patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch \
            staging/0001-image-subs-colorspace.patch

          should_skip() {
            case "$1" in
              KERNEL32.*|USER32.*|GDI32.*|ADVAPI32.*|MSVCRT.*|SHELL32.*|ole32.*|OLEAUT32.*|WS2_32.*|IMM32.*|VERSION.*|WINMM.*|d3d*|dxgi*|opengl32.*|setupapi.*|RPCRT4.*|bcrypt.*|CRYPT32.*|comdlg32.*|netapi32.*|powrprof.*|psapi.*|userenv.*|wininet.*|wintrust.*|comctl32.*|iphlpapi.*|secur32.*|uxtheme.*|dwmapi.*|crypt32.*|ncrypt.*|dnsapi.*|mpr.*|mswsock.*|odbc32.*|odbccp32.*|VCRUNTIME*|api-ms-*)
                return 0 ;;
            esac
            return 1
          }

          worklist=(staging/mpv.exe)
          while [ ${#worklist[@]} -gt 0 ]; do
            binary="${worklist[0]}"
            worklist=("${worklist[@]:1}")
            for dll in $(x86_64-w64-mingw32-objdump -p "$binary" 2>/dev/null \
              | awk '/DLL Name:/ {print $3}'); do
              should_skip "$dll" && continue
              [ -f "staging/$dll" ] && continue
              if [ -f "$SYS/bin/$dll" ]; then
                cp "$SYS/bin/$dll" staging/
                worklist+=("staging/$dll")
              else
                echo "Missing dependency: $dll" >&2
                exit 1
              fi
            done
          done

          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            if [ -f "$SYS/bin/$dll" ] && [ ! -f "staging/$dll" ]; then
              cp "$SYS/bin/$dll" staging/
            fi
          done

          archive=mpv-omniphony-fel-beta.6-yaozhi-image-subs-windows-x86_64.zip
          (
            cd staging
            zip -r "../$archive" .
          )
          sha256sum "$archive" > SHA256SUMS.txt

      - name: Upload custom Atmos player
        uses: actions/upload-artifact@v6
        with:
          name: mpv-atmos-hdr-pgs-windows-x86_64
          path: |
            mpv-omniphony-fel-beta.6-yaozhi-image-subs-windows-x86_64.zip
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7
