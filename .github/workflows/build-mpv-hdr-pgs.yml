name: Build mpv HDR PGS fix

on:
  push:
    branches:
      - codex/hdr-pgs-core-fix
    paths:
      - ".github/workflows/build-mpv-hdr-pgs.yml"
      - "patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex gettext git mercurial subversion \
            ninja-build gyp cmake yasm nasm automake pkg-config libtool \
            libtool-bin gcc-multilib g++-multilib clang lld libc++-dev \
            libc++abi-dev libgmp-dev libmpfr-dev libmpc-dev libgcrypt20-dev \
            gperf ragel texinfo autopoint re2c asciidoc python3-pip \
            python3-cairo docbook2x unzip p7zip-full curl wget ccache
          python3 -m pip install --break-system-packages \
            rst2pdf meson mako jsonschema roman
          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check out configuration and patch
        uses: actions/checkout@v6

      - name: Prepare matching Windows build system
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/zhongfly/mpv-winbuild.git winbuild
          git clone https://github.com/shinchiro/mpv-winbuild-cmake.git \
            winbuild/mpv-winbuild-cmake

          cd winbuild/mpv-winbuild-cmake
          if ! git am --3way ../patch_pr/0000-mpv-add-patch.patch; then
            git am --abort || true
            echo "::notice::Base tree already contains or conflicts with the optional patch framework patch"
          fi
          for patch in ../patch/*.patch; do
            echo "Applying required build patch: $patch"
            git am --3way "$patch"
          done

          cp "$GITHUB_WORKSPACE/patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch" \
            packages/mpv-9000-image-subs-colorspace.patch

          sed -i \
            '/GIT_REPOSITORY https:\/\/github.com\/mpv-player\/mpv.git/a\\    GIT_TAG 99b4c12cc' \
            packages/mpv.cmake
          sed -i \
            's#https://git.videolan.org/git/ffmpeg/nv-codec-headers.git#https://github.com/FFmpeg/nv-codec-headers.git#' \
            packages/nvcodec-headers.cmake

          test -f packages/curl.cmake
          grep -Eq '^[[:space:]]*curl[[:space:]]*$' packages/mpv.cmake
          grep -Fq -- '-Dlibcurl=enabled' packages/mpv.cmake
          if grep -E 'list\(APPEND removed .*"curl"' packages/CMakeLists.txt; then
            echo "::error::curl is still excluded from the mpv dependency graph"
            exit 1
          fi
          grep -A5 -B2 'GIT_REPOSITORY.*mpv-player' packages/mpv.cmake
          grep -n 'PATCH_COMMAND.*mpv-' packages/mpv.cmake
          grep -n -A4 -B4 -- '-Dlibcurl=enabled' packages/mpv.cmake
          grep -n 'GIT_REPOSITORY.*nv-codec-headers' packages/nvcodec-headers.cmake

      - name: Restore reusable build cache
        uses: actions/cache@v5
        with:
          path: |
            winbuild/mpv-winbuild-cmake/build64
            winbuild/mpv-winbuild-cmake/src_packages
            winbuild/mpv-winbuild-cmake/install_rustup
            .ccache
          key: mpv-hdr-pgs-libcurl-v1-ubuntu-gcc64-${{ hashFiles('patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch') }}
          restore-keys: |
            mpv-hdr-pgs-libcurl-v1-ubuntu-gcc64-

      - name: Build static x86-64 mpv
        id: build
        continue-on-error: true
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euxo pipefail
          cd winbuild/mpv-winbuild-cmake
          bash ../build.sh -t 64 -c gcc -s false

      - name: Collect failed build logs
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          find winbuild/mpv-winbuild-cmake/build64 -type f \
            \( -iname '*-*.log' -o -path '*/ffbuild/config.log' \) \
            -print > build-log-files.txt
          7za a build-logs.7z @build-log-files.txt

      - name: Upload failed build logs
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: mpv-hdr-pgs-build-logs
          path: |
            build-logs.7z
            build-log-files.txt
          if-no-files-found: error
          retention-days: 7

      - name: Stop after failed build
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Verify package contents
        shell: bash
        run: |
          set -euxo pipefail
          archive="$(find winbuild/mpv-winbuild-cmake/release \
            -maxdepth 1 -type f -name 'mpv-x86_64-*.7z' -print -quit)"
          test -n "$archive"
          7za l "$archive" | grep -E 'mpv\.(exe|com)'
          mkdir artifact
          cp "$archive" artifact/
          sha256sum "$archive" > artifact/SHA256SUMS.txt

      - name: Upload custom mpv
        uses: actions/upload-artifact@v6
        with:
          name: mpv-hdr-pgs-x86_64
          path: artifact/*
          if-no-files-found: error
          retention-days: 7
