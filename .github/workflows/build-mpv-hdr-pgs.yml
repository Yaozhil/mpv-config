name: Build mpv HDR PGS fix

on:
  push:
    branches:
      - codex/hdr-pgs-core-fix
    paths:
      - ".github/workflows/build-mpv-hdr-pgs.yml"
      - "patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      MPV_WINBUILD_COMMIT: b4b1088c30e8821e012fd20052de4c2d3a8eaad4
      MPV_WINBUILD_CMAKE_COMMIT: 04283f7e911149809c46bc236a834cf7134ba133

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex gettext git mercurial subversion \
            ninja-build gyp cmake yasm nasm automake pkg-config libtool \
            libtool-bin gcc-multilib g++-multilib clang lld libc++-dev \
            libc++abi-dev libgmp-dev libmpfr-dev libmpc-dev libgcrypt20-dev \
            gperf ragel texinfo autopoint re2c asciidoc python3-pip \
            python3-cairo docbook2x unzip p7zip-full curl wget ccache
          python3 -m pip install --break-system-packages \
            rst2pdf meson mako jsonschema roman
          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check out configuration and patch
        uses: actions/checkout@v6

      - name: Prepare matching Windows build system
        shell: bash
        run: |
          set -euxo pipefail

          clone_commit() {
            local repository="$1"
            local destination="$2"
            local commit="$3"
            git init "$destination"
            git -C "$destination" remote add origin "$repository"
            git -C "$destination" fetch --depth 1 origin "$commit"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$commit"
          }

          clone_commit \
            https://github.com/zhongfly/mpv-winbuild.git \
            winbuild \
            "$MPV_WINBUILD_COMMIT"
          clone_commit \
            https://github.com/shinchiro/mpv-winbuild-cmake.git \
            winbuild/mpv-winbuild-cmake \
            "$MPV_WINBUILD_CMAKE_COMMIT"

          cd winbuild/mpv-winbuild-cmake
          for patch in ../patch/*.patch; do
            if [ "$(basename "$patch")" = \
              "0008-ngtcp2-nghttp3-nghttp2-add-ngtcp2-nghttp3-nghttp2.patch" ]; then
              echo "Skipping optional HTTP/3 patch incompatible with current OpenSSL"
              continue
            fi
            echo "Applying required build patch: $patch"
            git am --3way "$patch"
          done

          python3 - <<'PY'
          from pathlib import Path

          path = Path("packages/mpv.cmake")
          text = path.read_text()
          patch_command = (
              "    GIT_CLONE_FLAGS \"\"\n"
              "    PATCH_COMMAND ${EXEC} git am --3way "
              "${CMAKE_CURRENT_SOURCE_DIR}/mpv-*.patch\n"
          )
          if "PATCH_COMMAND ${EXEC} git am --3way ${CMAKE_CURRENT_SOURCE_DIR}/mpv-*.patch" not in text:
              anchor = '    GIT_CLONE_FLAGS "--filter=tree:0"\n'
              if anchor not in text:
                  raise SystemExit("Could not locate mpv GIT_CLONE_FLAGS anchor")
              text = text.replace(anchor, patch_command, 1)
              path.write_text(text)
          PY

          cp "$GITHUB_WORKSPACE/patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch" \
            packages/mpv-9000-image-subs-colorspace.patch

          sed -i \
            '/GIT_REPOSITORY https:\/\/github.com\/mpv-player\/mpv.git/a\\    GIT_TAG 99b4c12cc' \
            packages/mpv.cmake
          sed -i \
            's#https://git.videolan.org/git/ffmpeg/nv-codec-headers.git#https://github.com/FFmpeg/nv-codec-headers.git#' \
            packages/nvcodec-headers.cmake

          # curl enables experimental ECH by default in the imported patch,
          # but the pinned OpenSSL build does not expose an ECH API.
          # Keep normal HTTPS, Windows CA, HTTP/2 and HTTPS RR enabled.
          sed -i \
            's/-DUSE_ECH=ON/-DUSE_ECH=OFF/' \
            packages/curl.cmake

          test -f packages/curl.cmake
          grep -Eq '^[[:space:]]*curl[[:space:]]*$' packages/mpv.cmake
          grep -Fq -- '-Dlibcurl=enabled' packages/mpv.cmake
          if grep -E 'list\(APPEND removed .*"curl"' packages/CMakeLists.txt; then
            echo "::error::curl is still excluded from the mpv dependency graph"
            exit 1
          fi
          grep -Fq -- '-DCURL_USE_OPENSSL=ON' packages/curl.cmake
          grep -Fq -- '-DCURL_CA_NATIVE=ON' packages/curl.cmake
          grep -Fq -- '-DUSE_ECH=OFF' packages/curl.cmake
          if grep -Fq -- '-DUSE_ECH=ON' packages/curl.cmake; then
            echo "::error::curl ECH is enabled with an OpenSSL build that lacks ECH"
            exit 1
          fi
          if grep -Eq 'ngtcp2|nghttp3|USE_NGTCP2=ON|USE_NGHTTP3=ON' \
            packages/CMakeLists.txt packages/curl.cmake; then
            echo "::error::optional HTTP/3 dependencies are still enabled"
            exit 1
          fi
          grep -A5 -B2 'GIT_REPOSITORY.*mpv-player' packages/mpv.cmake
          grep -n 'PATCH_COMMAND.*mpv-' packages/mpv.cmake
          grep -n -A4 -B4 -- '-Dlibcurl=enabled' packages/mpv.cmake
          grep -n -A10 -B4 -- '-DCURL_USE_OPENSSL=ON' packages/curl.cmake
          grep -n 'GIT_REPOSITORY.*nv-codec-headers' packages/nvcodec-headers.cmake

      - name: Restore reusable build cache
        uses: actions/cache@v5
        with:
          path: |
            winbuild/mpv-winbuild-cmake/build64
            winbuild/mpv-winbuild-cmake/src_packages
            winbuild/mpv-winbuild-cmake/install_rustup
            .ccache
          key: mpv-hdr-pgs-libcurl-pinned-no-ech-v3-ubuntu-gcc64-${{ hashFiles('patches/0001-vo_gpu_next-add-image-subtitle-colorspace-control.patch') }}
          restore-keys: |
            mpv-hdr-pgs-libcurl-pinned-no-ech-v3-ubuntu-gcc64-

      - name: Preflight and build libcurl dependency chain
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euxo pipefail
          cd winbuild/mpv-winbuild-cmake

          cmake -Wno-dev --fresh \
            -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DCOMPILER_TOOLCHAIN=gcc \
            -DENABLE_CCACHE=ON \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/install_rustup" \
            -G Ninja \
            -S . \
            -B build64

          ninja -C build64 download || true
          if [ ! -f build64/install/bin/cross-gcc ]; then
            ninja -C build64 gcc
            rm -rf build64/toolchain
          fi
          ninja -C build64 update
          ninja -C build64 curl

      - name: Build static x86-64 mpv
        id: build
        continue-on-error: true
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euxo pipefail
          cd winbuild/mpv-winbuild-cmake
          bash ../build.sh -t 64 -c gcc -s false

      - name: Collect failed build logs
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          find winbuild/mpv-winbuild-cmake/build64 -type f \
            \( -iname '*-*.log' -o -path '*/ffbuild/config.log' \) \
            -print > build-log-files.txt
          7za a build-logs.7z @build-log-files.txt

      - name: Upload failed build logs
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: mpv-hdr-pgs-build-logs
          path: |
            build-logs.7z
            build-log-files.txt
          if-no-files-found: error
          retention-days: 7

      - name: Stop after failed build
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Verify package contents
        shell: bash
        run: |
          set -euxo pipefail
          archive="$(find winbuild/mpv-winbuild-cmake/release \
            -maxdepth 1 -type f -name 'mpv-x86_64-*.7z' -print -quit)"
          test -n "$archive"
          7za l "$archive" | grep -E 'mpv\.(exe|com)'
          mkdir artifact
          cp "$archive" artifact/
          sha256sum "$archive" > artifact/SHA256SUMS.txt

      - name: Upload custom mpv
        uses: actions/upload-artifact@v6
        with:
          name: mpv-hdr-pgs-x86_64
          path: artifact/*
          if-no-files-found: error
          retention-days: 7
