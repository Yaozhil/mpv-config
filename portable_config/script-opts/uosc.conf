# uosc public defaults
# Full script files should be synced from the release package or upstream uosc-compatible config.

language=zh-hans
timeline_style=bar
controls=menu,gap,subtitles,audio,playlist,chapters,editions,stream-quality,open-file,items,fullscreen
idle_indicator=yes
pause_indicator=flash
top_bar=never
proximity_in=40
proximity_out=120
font_scale=1
