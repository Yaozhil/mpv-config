# Yaozhil mpv config - public shortcut preset
# Keep shortcuts clear and easy to adjust for all users.

SPACE cycle pause                          #menu: 播放 > 播放/暂停
ENTER cycle fullscreen                     #menu: 窗口 > 全屏
ESC set fullscreen no                      #menu: 窗口 > 退出全屏
RIGHT seek 5 exact                         #menu: 播放 > 前进 5 秒
LEFT seek -5 exact                         #menu: 播放 > 后退 5 秒
UP add volume 5                            #menu: 音频 > 音量 +5
DOWN add volume -5                         #menu: 音频 > 音量 -5
m cycle mute                               #menu: 音频 > 静音

# UI / uosc
TAB script-binding uosc/toggle-ui          #menu: UI > 显示/隐藏界面
MENU script-binding uosc/menu              #menu: UI > 右键菜单
MBTN_RIGHT script-binding uosc/menu        #menu: UI > 右键菜单

# Playlist / chapter / tracks
F7 script-binding uosc/playlist            #menu: 列表 > 播放列表
F8 script-binding uosc/chapters            #menu: 列表 > 章节
F10 script-binding uosc/audio              #menu: 音轨 > 音轨列表
F11 script-binding uosc/subtitles          #menu: 字幕 > 字幕列表
PGUP playlist-prev                         #menu: 播放列表 > 上一个
PGDWN playlist-next                        #menu: 播放列表 > 下一个

# Stats
I script-binding stats/display-stats-toggle #menu: 信息 > 常驻统计
i script-binding stats/display-stats        #menu: 信息 > 临时统计

# Subtitle basics
j cycle sub                                #menu: 字幕 > 切换字幕
J cycle sub down                           #menu: 字幕 > 反向切换字幕
z add sub-delay -0.1                       #menu: 字幕 > 字幕提前
x add sub-delay 0.1                        #menu: 字幕 > 字幕延后
Alt+- add sub-scale -0.05                  #menu: 字幕 > 字号减小
Alt+= add sub-scale 0.05                   #menu: 字幕 > 字号增大

# Audio basics
a cycle audio                              #menu: 音频 > 切换音轨
A cycle audio down                         #menu: 音频 > 反向切换音轨
Alt+Y cycle-values audio-channels auto-safe stereo 5.1 7.1 #menu: 音频 > 循环声道输出

# Speed
[ multiply speed 0.9091                    #menu: 播放速度 > 减慢
] multiply speed 1.1                       #menu: 播放速度 > 加快
BS set speed 1.0                           #menu: 播放速度 > 恢复 1.0x

# Screenshot
s screenshot video                         #menu: 截图 > 视频截图
S screenshot subtitles                     #menu: 截图 > 含字幕截图

# Ontop / mini window
T cycle ontop                              #menu: 窗口 > 置顶/取消置顶
Alt+T cycle-values ontop no yes            #menu: 窗口 > 切换置顶

# Intro / outro markers, requires skip-segments script in full package
Alt+N script-message-to skip-segments mark-current-position #menu: 片头片尾 > 手动标记
Alt+Q script-message-to skip-segments toggle-skip-mode       #menu: 片头片尾 > 切换跳过模式

# Danmaku, requires uosc_danmaku script in full package
D script-message-to uosc_danmaku toggle    #menu: 弹幕 > 开关弹幕
Alt+D script-message-to uosc_danmaku menu  #menu: 弹幕 > 弹幕菜单

# Shader toggles. Shader files are optional and can be added under portable_config/shaders.
CTRL+0 change-list glsl-shaders clr ""     #menu: 着色器 > 清空
CTRL+1 change-list glsl-shaders toggle "~~/shaders/igv/KrigBilateral.glsl"    #menu: 着色器 > KrigBilateral
CTRL+2 change-list glsl-shaders toggle "~~/shaders/igv/SSimSuperRes.glsl"     #menu: 着色器 > SSimSuperRes
CTRL+3 change-list glsl-shaders toggle "~~/shaders/igv/SSimDownscaler.glsl"   #menu: 着色器 > SSimDownscaler
