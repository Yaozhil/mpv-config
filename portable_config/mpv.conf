# Yaozhil mpv config - public universal defaults
# This file is intentionally hardware-neutral.

########## General ##########
profile=gpu-hq
vo=gpu-next
gpu-context=auto
hwdec=auto-safe

# Do not bind a specific GPU. Users can uncomment and set these locally when needed.
# gpu-api=d3d11
# d3d11-adapter=
# vulkan-device=

########## Audio ##########
audio-device=auto
audio-channels=auto-safe
audio-pitch-correction=yes
volume=80
volume-max=130

########## Window / UI ##########
osc=no
border=no
keep-open=yes
save-position-on-quit=yes
force-window=immediate
idle=yes

# Portable paths. Do not use personal absolute paths here.
screenshot-directory="~~/screenshots"
gpu-shader-cache-dir="~~/cache/shaders_cache"
watch-later-directory="~~/watch_later"

########## Subtitles ##########
sub-auto=fuzzy
sub-file-paths=subs;subtitles;字幕
slang=chi,zh,zh-CN,zh-Hans,chs,sc,eng,en
alang=chi,zh,zh-CN,zh-Hans,chs,sc,jpn,ja,eng,en
sub-font-size=42
sub-border-size=2.5
sub-shadow-offset=1
sub-ass-override=no

########## Network / ytdl ##########
ytdl=yes
ytdl-format=bestvideo+bestaudio/best
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB

########## Screenshots ##########
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-template="%f-%P"

########## Shaders ##########
# Shaders are optional and should be enabled by the user according to GPU performance.
# Example:
# glsl-shaders="~~/shaders/igv/SSimDownscaler.glsl"

########## Profiles ##########
[fast]
profile-desc="Low power / old laptops"
hwdec=auto-safe
scale=bilinear
cscale=bilinear
dscale=bilinear

[quality]
profile-desc="Higher quality rendering"
scale=ewa_lanczossharp
cscale=ewa_lanczossoft
dscale=mitchell
correct-downscaling=yes
sigmoid-upscaling=yes

[compat]
profile-desc="Compatibility mode"
vo=gpu
hwdec=no
gpu-api=auto
